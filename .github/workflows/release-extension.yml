name: Build and Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm run build

      - name: Prepare package directories
        run: |
          set -euo pipefail

          rm -rf package
          mkdir -p package/chrome package/firefox

      - name: Prepare Chrome extension package
        run: |
          set -euo pipefail

          cp -R dist/. package/chrome/

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const manifestPath = path.join('package/chrome', 'manifest.json');
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          if (manifest.background && manifest.background.scripts) {
            delete manifest.background.scripts;
          }
          delete manifest.browser_specific_settings;

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          cd package/chrome
          zip -r "../../youtube-blue-chrome-${{ github.ref_name }}.zip" .

      - name: Prepare Firefox extension package
        run: |
          set -euo pipefail

          cp -R dist/. package/firefox/

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const manifestPath = path.join('package/firefox', 'manifest.json');
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          if (manifest.background && manifest.background.service_worker) {
            delete manifest.background.service_worker;
          }

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          cd package/firefox
          zip -r "../../youtube-blue-firefox-${{ github.ref_name }}.zip" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips-${{ github.ref_name }}
          path: |
            youtube-blue-chrome-${{ github.ref_name }}.zip
            youtube-blue-firefox-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: youtube-blue-chrome-${{ github.ref_name }}.zip,youtube-blue-firefox-${{ github.ref_name }}.zip
